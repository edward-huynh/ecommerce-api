<svg width="1400" height="1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; fill: #2c3e50; }
      .subtitle { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #34495e; }
      .text { font-family: Arial, sans-serif; font-size: 12px; fill: #2c3e50; }
      .small-text { font-family: Arial, sans-serif; font-size: 10px; fill: #7f8c8d; }
      .client-box { fill: #3498db; stroke: #2980b9; stroke-width: 2; }
      .controller-box { fill: #e74c3c; stroke: #c0392b; stroke-width: 2; }
      .service-box { fill: #f39c12; stroke: #e67e22; stroke-width: 2; }
      .database-box { fill: #27ae60; stroke: #229954; stroke-width: 2; }
      .auth-box { fill: #9b59b6; stroke: #8e44ad; stroke-width: 2; }
      .guard-box { fill: #e67e22; stroke: #d35400; stroke-width: 2; }
      .arrow { stroke: #34495e; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .auth-arrow { stroke: #9b59b6; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .data-arrow { stroke: #27ae60; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34495e" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="700" y="30" text-anchor="middle" class="title">Sơ đồ luồng đi - E-commerce API (NestJS)</text>

  <!-- Client Layer -->
  <rect x="50" y="80" width="200" height="60" rx="10" class="client-box"/>
  <text x="150" y="100" text-anchor="middle" class="subtitle" fill="white">Client Applications</text>
  <text x="150" y="120" text-anchor="middle" class="text" fill="white">Web/Mobile/API Clients</text>

  <!-- API Gateway/Entry Point -->
  <rect x="350" y="80" width="200" height="60" rx="10" class="controller-box"/>
  <text x="450" y="100" text-anchor="middle" class="subtitle" fill="white">NestJS Application</text>
  <text x="450" y="120" text-anchor="middle" class="text" fill="white">main.ts + app.module.ts</text>

  <!-- Authentication Flow -->
  <rect x="650" y="50" width="180" height="120" rx="10" class="auth-box"/>
  <text x="740" y="75" text-anchor="middle" class="subtitle" fill="white">Authentication Layer</text>
  <text x="740" y="95" text-anchor="middle" class="small-text" fill="white">JWT Strategy</text>
  <text x="740" y="110" text-anchor="middle" class="small-text" fill="white">JwtAuthGuard</text>
  <text x="740" y="125" text-anchor="middle" class="small-text" fill="white">RolesGuard</text>
  <text x="740" y="140" text-anchor="middle" class="small-text" fill="white">@CurrentUser Decorator</text>
  <text x="740" y="155" text-anchor="middle" class="small-text" fill="white">@Roles Decorator</text>

  <!-- Controllers Layer -->
  <rect x="50" y="220" width="150" height="80" rx="8" class="controller-box"/>
  <text x="125" y="240" text-anchor="middle" class="subtitle" fill="white">Auth Controller</text>
  <text x="125" y="255" text-anchor="middle" class="small-text" fill="white">/auth/register</text>
  <text x="125" y="270" text-anchor="middle" class="small-text" fill="white">/auth/login</text>
  <text x="125" y="285" text-anchor="middle" class="small-text" fill="white">/auth/profile</text>

  <rect x="220" y="220" width="150" height="80" rx="8" class="controller-box"/>
  <text x="295" y="240" text-anchor="middle" class="subtitle" fill="white">Users Controller</text>
  <text x="295" y="255" text-anchor="middle" class="small-text" fill="white">/users</text>
  <text x="295" y="270" text-anchor="middle" class="small-text" fill="white">CRUD Operations</text>
  <text x="295" y="285" text-anchor="middle" class="small-text" fill="white">Role Management</text>

  <rect x="390" y="220" width="150" height="80" rx="8" class="controller-box"/>
  <text x="465" y="240" text-anchor="middle" class="subtitle" fill="white">Products Controller</text>
  <text x="465" y="255" text-anchor="middle" class="small-text" fill="white">/products</text>
  <text x="465" y="270" text-anchor="middle" class="small-text" fill="white">CRUD Operations</text>
  <text x="465" y="285" text-anchor="middle" class="small-text" fill="white">Category Filter</text>

  <rect x="560" y="220" width="150" height="80" rx="8" class="controller-box"/>
  <text x="635" y="240" text-anchor="middle" class="subtitle" fill="white">Orders Controller</text>
  <text x="635" y="255" text-anchor="middle" class="small-text" fill="white">/orders</text>
  <text x="635" y="270" text-anchor="middle" class="small-text" fill="white">Create/View Orders</text>
  <text x="635" y="285" text-anchor="middle" class="small-text" fill="white">Order Management</text>

  <rect x="730" y="220" width="150" height="80" rx="8" class="controller-box"/>
  <text x="805" y="240" text-anchor="middle" class="subtitle" fill="white">Categories Controller</text>
  <text x="805" y="255" text-anchor="middle" class="small-text" fill="white">/categories</text>
  <text x="805" y="270" text-anchor="middle" class="small-text" fill="white">CRUD Operations</text>

  <rect x="900" y="220" width="150" height="80" rx="8" class="controller-box"/>
  <text x="975" y="240" text-anchor="middle" class="subtitle" fill="white">Posts Controller</text>
  <text x="975" y="255" text-anchor="middle" class="small-text" fill="white">/posts</text>
  <text x="975" y="270" text-anchor="middle" class="small-text" fill="white">Blog/News</text>
  <text x="975" y="285" text-anchor="middle" class="small-text" fill="white">Content Management</text>

  <!-- Services Layer -->
  <rect x="50" y="380" width="150" height="80" rx="8" class="service-box"/>
  <text x="125" y="400" text-anchor="middle" class="subtitle" fill="white">Auth Service</text>
  <text x="125" y="415" text-anchor="middle" class="small-text" fill="white">JWT Generation</text>
  <text x="125" y="430" text-anchor="middle" class="small-text" fill="white">Password Validation</text>
  <text x="125" y="445" text-anchor="middle" class="small-text" fill="white">Email Verification</text>

  <rect x="220" y="380" width="150" height="80" rx="8" class="service-box"/>
  <text x="295" y="400" text-anchor="middle" class="subtitle" fill="white">Users Service</text>
  <text x="295" y="415" text-anchor="middle" class="small-text" fill="white">User CRUD</text>
  <text x="295" y="430" text-anchor="middle" class="small-text" fill="white">Password Hashing</text>
  <text x="295" y="445" text-anchor="middle" class="small-text" fill="white">Profile Management</text>

  <rect x="390" y="380" width="150" height="80" rx="8" class="service-box"/>
  <text x="465" y="400" text-anchor="middle" class="subtitle" fill="white">Products Service</text>
  <text x="465" y="415" text-anchor="middle" class="small-text" fill="white">Product CRUD</text>
  <text x="465" y="430" text-anchor="middle" class="small-text" fill="white">Inventory Management</text>
  <text x="465" y="445" text-anchor="middle" class="small-text" fill="white">Search & Filter</text>

  <rect x="560" y="380" width="150" height="80" rx="8" class="service-box"/>
  <text x="635" y="400" text-anchor="middle" class="subtitle" fill="white">Orders Service</text>
  <text x="635" y="415" text-anchor="middle" class="small-text" fill="white">Order Processing</text>
  <text x="635" y="430" text-anchor="middle" class="small-text" fill="white">Payment Integration</text>
  <text x="635" y="445" text-anchor="middle" class="small-text" fill="white">Status Management</text>

  <rect x="730" y="380" width="150" height="80" rx="8" class="service-box"/>
  <text x="805" y="400" text-anchor="middle" class="subtitle" fill="white">Categories Service</text>
  <text x="805" y="415" text-anchor="middle" class="small-text" fill="white">Category CRUD</text>
  <text x="805" y="430" text-anchor="middle" class="small-text" fill="white">Hierarchy Management</text>

  <rect x="900" y="380" width="150" height="80" rx="8" class="service-box"/>
  <text x="975" y="400" text-anchor="middle" class="subtitle" fill="white">Posts Service</text>
  <text x="975" y="415" text-anchor="middle" class="small-text" fill="white">Content CRUD</text>
  <text x="975" y="430" text-anchor="middle" class="small-text" fill="white">Publishing</text>

  <!-- Database Schemas -->
  <rect x="50" y="540" width="150" height="80" rx="8" class="database-box"/>
  <text x="125" y="560" text-anchor="middle" class="subtitle" fill="white">User Schema</text>
  <text x="125" y="575" text-anchor="middle" class="small-text" fill="white">email, password</text>
  <text x="125" y="590" text-anchor="middle" class="small-text" fill="white">role, status</text>
  <text x="125" y="605" text-anchor="middle" class="small-text" fill="white">isEmailVerified</text>

  <rect x="220" y="540" width="150" height="80" rx="8" class="database-box"/>
  <text x="295" y="560" text-anchor="middle" class="subtitle" fill="white">Product Schema</text>
  <text x="295" y="575" text-anchor="middle" class="small-text" fill="white">name, description</text>
  <text x="295" y="590" text-anchor="middle" class="small-text" fill="white">price, category</text>
  <text x="295" y="605" text-anchor="middle" class="small-text" fill="white">stock, images</text>

  <rect x="390" y="540" width="150" height="80" rx="8" class="database-box"/>
  <text x="465" y="560" text-anchor="middle" class="subtitle" fill="white">Order Schema</text>
  <text x="465" y="575" text-anchor="middle" class="small-text" fill="white">user, products</text>
  <text x="465" y="590" text-anchor="middle" class="small-text" fill="white">total, status</text>
  <text x="465" y="605" text-anchor="middle" class="small-text" fill="white">shipping info</text>

  <rect x="560" y="540" width="150" height="80" rx="8" class="database-box"/>
  <text x="635" y="560" text-anchor="middle" class="subtitle" fill="white">Category Schema</text>
  <text x="635" y="575" text-anchor="middle" class="small-text" fill="white">name, description</text>
  <text x="635" y="590" text-anchor="middle" class="small-text" fill="white">parent category</text>

  <rect x="730" y="540" width="150" height="80" rx="8" class="database-box"/>
  <text x="805" y="560" text-anchor="middle" class="subtitle" fill="white">Post Schema</text>
  <text x="805" y="575" text-anchor="middle" class="small-text" fill="white">title, content</text>
  <text x="805" y="590" text-anchor="middle" class="small-text" fill="white">author, status</text>
  <text x="805" y="605" text-anchor="middle" class="small-text" fill="white">published date</text>

  <!-- MongoDB Database -->
  <rect x="400" y="700" width="300" height="80" rx="10" class="database-box"/>
  <text x="550" y="725" text-anchor="middle" class="subtitle" fill="white">MongoDB Database</text>
  <text x="550" y="745" text-anchor="middle" class="text" fill="white">Mongoose ODM</text>
  <text x="550" y="765" text-anchor="middle" class="text" fill="white">Collections: users, products, orders, categories, posts</text>

  <!-- Configuration & Middleware -->
  <rect x="1100" y="80" width="250" height="200" rx="10" class="guard-box"/>
  <text x="1225" y="105" text-anchor="middle" class="subtitle" fill="white">Configuration & Middleware</text>
  <text x="1225" y="130" text-anchor="middle" class="small-text" fill="white">• CORS Configuration</text>
  <text x="1225" y="145" text-anchor="middle" class="small-text" fill="white">• Global Validation Pipe</text>
  <text x="1225" y="160" text-anchor="middle" class="small-text" fill="white">• Swagger Documentation</text>
  <text x="1225" y="175" text-anchor="middle" class="small-text" fill="white">• JWT Configuration</text>
  <text x="1225" y="190" text-anchor="middle" class="small-text" fill="white">• Database Configuration</text>
  <text x="1225" y="205" text-anchor="middle" class="small-text" fill="white">• Environment Variables</text>
  <text x="1225" y="220" text-anchor="middle" class="small-text" fill="white">• bcrypt Password Hashing</text>
  <text x="1225" y="235" text-anchor="middle" class="small-text" fill="white">• class-validator DTOs</text>
  <text x="1225" y="250" text-anchor="middle" class="small-text" fill="white">• Exception Filters</text>
  <text x="1225" y="265" text-anchor="middle" class="small-text" fill="white">• Interceptors</text>

  <!-- Request Flow Arrows -->
  <line x1="250" y1="110" x2="350" y2="110" class="arrow"/>
  <line x1="550" y1="110" x2="650" y2="110" class="auth-arrow"/>

  <!-- Controller to Service Arrows -->
  <line x1="125" y1="300" x2="125" y2="380" class="arrow"/>
  <line x1="295" y1="300" x2="295" y2="380" class="arrow"/>
  <line x1="465" y1="300" x2="465" y2="380" class="arrow"/>
  <line x1="635" y1="300" x2="635" y2="380" class="arrow"/>
  <line x1="805" y1="300" x2="805" y2="380" class="arrow"/>
  <line x1="975" y1="300" x2="975" y2="380" class="arrow"/>

  <!-- Service to Schema Arrows -->
  <line x1="125" y1="460" x2="125" y2="540" class="data-arrow"/>
  <line x1="295" y1="460" x2="295" y2="540" class="data-arrow"/>
  <line x1="465" y1="460" x2="465" y2="540" class="data-arrow"/>
  <line x1="635" y1="460" x2="635" y2="540" class="data-arrow"/>
  <line x1="805" y1="460" x2="805" y2="540" class="data-arrow"/>
  <line x1="975" y1="460" x2="975" y2="540" class="data-arrow"/>

  <!-- Schema to Database Arrows -->
  <line x1="125" y1="620" x2="450" y2="700" class="data-arrow"/>
  <line x1="295" y1="620" x2="500" y2="700" class="data-arrow"/>
  <line x1="465" y1="620" x2="550" y2="700" class="data-arrow"/>
  <line x1="635" y1="620" x2="600" y2="700" class="data-arrow"/>
  <line x1="805" y1="620" x2="650" y2="700" class="data-arrow"/>

  <!-- Authentication Flow -->
  <text x="50" y="850" class="subtitle">Luồng xác thực:</text>
  <text x="50" y="870" class="text">1. Client gửi request với JWT token trong header Authorization</text>
  <text x="50" y="885" class="text">2. JwtAuthGuard xác thực token và gọi JwtStrategy.validate()</text>
  <text x="50" y="900" class="text">3. RolesGuard kiểm tra quyền truy cập dựa trên role của user</text>
  <text x="50" y="915" class="text">4. @CurrentUser decorator inject thông tin user vào controller</text>
  <text x="50" y="930" class="text">5. Controller xử lý business logic thông qua Service</text>
  <text x="50" y="945" class="text">6. Service tương tác với Database thông qua Mongoose Schema</text>
  <text x="50" y="960" class="text">7. Response được trả về client với dữ liệu hoặc lỗi</text>

  <!-- Data Flow Legend -->
  <text x="800" y="850" class="subtitle">Chú thích:</text>
  <line x1="800" y1="870" x2="830" y2="870" class="arrow"/>
  <text x="840" y="875" class="text">Request Flow</text>
  <line x1="800" y1="890" x2="830" y2="890" class="auth-arrow"/>
  <text x="840" y="895" class="text">Authentication Flow</text>
  <line x1="800" y1="910" x2="830" y2="910" class="data-arrow"/>
  <text x="840" y="915" class="text">Data Flow</text>

</svg>